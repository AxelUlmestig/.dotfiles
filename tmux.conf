set -g mouse on

# Let tmux talk to the system clipboard, and let programs inside tmux
# set it too (via OSC 52).
set -g set-clipboard on

# Use vi-style keys in copy mode (press `y` to yank). Drop this line if
# you prefer emacs-style copy-mode bindings.
setw -g mode-keys vi

# --- Wayland clipboard integration (wl-copy) ---
# `v` starts a selection, `y` copies it to the Wayland clipboard and exits.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Releasing a mouse drag also copies to the clipboard.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
